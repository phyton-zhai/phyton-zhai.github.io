<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品目录 — 植格 Phyton</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ============================================================
           全局 — 科技白左风（与全站统一）
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Inter', 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            background: #f7f6f3;
            color: #1e1e1e;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== 顶部导航 — 毛玻璃（与其他页面视觉统一） ===== */
        .top-nav {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(18px) saturate(1.2);
            -webkit-backdrop-filter: blur(18px) saturate(1.2);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }

        .nav-logo {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 4px;
            color: #1a1a1a;
            text-decoration: none;
            font-family: 'Times New Roman', serif;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2.2rem;
            align-items: center;
        }

        .nav-link {
            font-size: 0.8rem;
            font-weight: 450;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #3a3a3a;
            text-decoration: none;
            transition: color 0.25s ease;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: #1a1a1a;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link:hover {
            color: #000;
        }

        /* ===== 主内容 ===== */
        .catalog-page {
            max-width: 960px;
            margin: 3.5rem auto 2rem;
            padding: 0 2rem;
            flex: 1;
            width: 100%;
        }

        .catalog-page h1 {
            font-size: 2.4rem;
            font-weight: 400;
            letter-spacing: 4px;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 0.5rem;
            font-family: 'Times New Roman', serif;
        }

        .catalog-subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: #b8b3ab;
            letter-spacing: 2px;
            margin-bottom: 3rem;
        }

        /* ===== 分类区块 ===== */
        .catalog-category {
            margin-bottom: 3.5rem;
        }

        .category-header {
            display: flex;
            align-items: baseline;
            gap: 0.8rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .category-icon {
            font-size: 1.4rem;
        }

        .category-name {
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: 2px;
            color: #1a1a1a;
            font-family: 'Times New Roman', serif;
        }

        .category-count {
            font-size: 0.75rem;
            color: #b8b3ab;
            letter-spacing: 1px;
        }

        /* ===== 物种区块 ===== */
        .species-group {
            margin-bottom: 2rem;
        }

        .species-group-title {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: #5a5a5a;
            margin-bottom: 0.8rem;
            padding-left: 0.3rem;
        }

        /* ===== 产品卡片网格 ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
        }

        .product-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 1.3rem 1.5rem;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 1px 12px rgba(0, 0, 0, 0.02);
            text-decoration: none;
            color: inherit;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.06);
            border-color: rgba(0, 0, 0, 0.08);
        }

        /* 已售出卡片 */
        .product-card.sold {
            opacity: 0.45;
            pointer-events: none;
            filter: grayscale(0.6);
        }

        .product-card.sold .card-status {
            color: #b8b3ab;
        }

        .card-region {
            font-size: 0.85rem;
            font-weight: 500;
            color: #3a3a3a;
            letter-spacing: 0.5px;
        }

        .card-crop-hint {
            font-size: 0.7rem;
            color: #b8b3ab;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card-price {
            font-size: 0.9rem;
            font-weight: 500;
            color: #1a1a1a;
            letter-spacing: 1px;
            margin-top: auto;
        }

        .card-price.entry {
            color: #2c5f2d;
        }

        .card-status {
            font-size: 0.7rem;
            color: #b8b3ab;
            letter-spacing: 1px;
        }

        .card-arrow {
            font-size: 0.7rem;
            color: #ccc7bf;
            align-self: flex-end;
            transition: transform 0.2s;
        }

        .product-card:hover .card-arrow {
            transform: translateX(3px);
        }

        /* ===== 页脚 ===== */
        .site-footer {
            text-align: center;
            padding: 2.8rem 2rem 2.2rem;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            margin-top: 2.5rem;
            background: #fcfcfb;
        }

        .footer-slogan {
            font-size: 1rem;
            font-weight: 380;
            letter-spacing: 3px;
            color: #1a1a1a;
            margin-bottom: 0.2rem;
            font-family: 'Times New Roman', serif;
        }

        .footer-sub {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: #b8b3ab;
            margin-bottom: 0.6rem;
        }

        .footer-email {
            font-size: 0.7rem;
            color: #bfb9b1;
            letter-spacing: 0.5px;
            margin-bottom: 0.8rem;
        }
        .footer-email a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .footer-email a:hover {
            color: #1a1a1a;
        }

        .footer-copy {
            font-size: 0.7rem;
            color: #ccc7bf;
            letter-spacing: 1px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            .top-nav {
                padding: 0 1rem;
            }
            .nav-menu {
                gap: 1.2rem;
            }
            .nav-link {
                font-size: 0.7rem;
                letter-spacing: 0.5px;
            }
            .nav-logo {
                font-size: 1.1rem;
                letter-spacing: 2px;
            }
            .catalog-page {
                padding: 0 1.2rem;
                margin: 2rem auto 1rem;
            }
            .catalog-page h1 {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }
            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 0.8rem;
            }
            .product-card {
                padding: 1rem 1.2rem;
            }
            .footer-slogan {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 440px) {
            .nav-menu {
                gap: 0.8rem;
            }
            .nav-link {
                font-size: 0.6rem;
                letter-spacing: 0.3px;
            }
            .nav-logo {
                font-size: 0.95rem;
            }
            .catalog-page {
                padding: 0 0.8rem;
                margin: 1.5rem auto 0.5rem;
            }
            .catalog-page h1 {
                font-size: 1.5rem;
            }
            .product-grid {
                grid-template-columns: 1fr 1fr;
                gap: 0.6rem;
            }
            .product-card {
                padding: 0.8rem 1rem;
                border-radius: 10px;
            }
            .card-region {
                font-size: 0.78rem;
            }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">植格</a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="products.html" class="nav-link">产品目录</a></li>
                <li class="nav-item"><a href="auction.html" class="nav-link">竞拍规则</a></li>
                <li class="nav-item"><a href="institutional-inquiry.html" class="nav-link">机构咨询</a></li>
                <li class="nav-item"><a href="about.html" class="nav-link">关于植格</a></li>
                <li class="nav-item"><a href="tech/index.html" class="nav-link">技术白皮书</a></li>
            </ul>
        </div>
    </nav>

    <main class="catalog-page">
        <h1>物种目录</h1>
        <p class="catalog-subtitle">植物界的数字孪生基座</p>

        <div id="catalog-content">
            <!-- JS动态渲染 -->
            <div class="loading-placeholder" style="text-align:center;padding:4rem 2rem;color:#b8b3ab;font-size:0.95rem;letter-spacing:1px;">
                加载中…
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <p class="footer-slogan">万植有格。The Foundation of Digital Plant Life.</p>
        <p class="footer-sub">Philosopher-Zhai</p>
        <p class="footer-email">联系邮箱：<a href="mailto:phyton_zhai@outlook.com">phyton_zhai@outlook.com</a></p>
        <p class="footer-copy">© 2026 植格 Phyton</p>
    </footer>

    <script src="js/catalog.js"></script>
</body>
</html>

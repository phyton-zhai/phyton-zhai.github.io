<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品详情 — 植格 Phyton</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-y: scroll;
        }

        body {
            font-family: -apple-system, 'Inter', 'Helvetica Neue', 'Segoe UI', Roboto, sans-serif;
            background: #f7f6f3;
            color: #1e1e1e;
            line-height: 1.7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        .top-nav {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(18px) saturate(1.2);
            -webkit-backdrop-filter: blur(18px) saturate(1.2);
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }

        .nav-logo {
            font-size: 1.4rem;
            font-weight: 500;
            letter-spacing: 4px;
            color: #1a1a1a;
            text-decoration: none;
            font-family: 'Times New Roman', serif;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2.2rem;
            align-items: center;
        }

        .nav-menu li {
            display: block;
        }

        .nav-link {
            font-size: 0.8rem;
            font-weight: 450;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #3a3a3a;
            text-decoration: none;
            transition: color 0.25s ease;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: #1a1a1a;
            transition: width 0.3s ease;
        }

        .nav-link:hover::after {
            width: 100%;
        }

        .nav-link:hover {
            color: #000;
        }

        .product-detail {
            max-width: 780px;
            margin: 3rem auto 1.5rem;
            padding: 0 2rem;
            flex: 1;
            width: 100%;
        }

        .product-detail .detail-card {
            background: #ffffff;
            border-radius: 18px;
            padding: 2.8rem 3rem;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 2px 24px rgba(0, 0, 0, 0.02);
        }

        .product-detail .detail-header {
            text-align: center;
            padding-bottom: 1.8rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
            margin-bottom: 2rem;
        }

        .product-detail .detail-header h2 {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 3px;
            color: #1a1a1a;
            font-family: 'Times New Roman', serif;
            margin-bottom: 0.3rem;
        }

        .product-detail .detail-header .sub {
            font-size: 0.9rem;
            color: #8a8a8a;
            letter-spacing: 1px;
        }

        .product-detail .detail-header .price {
            display: inline-block;
            margin-top: 0.8rem;
            font-size: 1.3rem;
            font-weight: 500;
            color: #1a1a1a;
            letter-spacing: 2px;
            background: #f7f6f3;
            padding: 0.2rem 1.8rem;
            border-radius: 30px;
        }

        .product-detail .detail-section {
            margin-bottom: 1.8rem;
        }

        .product-detail .detail-section h3 {
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #5a5a5a;
            margin-bottom: 0.4rem;
        }

        .product-detail .detail-section p,
        .product-detail .detail-section li {
            font-size: 1rem;
            color: #3a3a3a;
            line-height: 1.9;
        }

        .product-detail .detail-section ul {
            list-style: none;
            padding: 0;
        }

        .product-detail .detail-section ul li {
            padding: 0.3rem 0 0.3rem 1.4rem;
            position: relative;
        }

        .product-detail .detail-section ul li::before {
            content: '—';
            position: absolute;
            left: 0;
            color: #b8b3ab;
        }

        .product-detail .detail-actions {
            margin-top: 2.2rem;
            padding-top: 1.8rem;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .product-detail .btn-primary,
        .product-detail .btn-secondary {
            display: inline-block;
            padding: 0.8rem 2.4rem;
            font-size: 0.8rem;
            font-family: 'Inter', -apple-system, sans-serif;
            font-weight: 480;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .product-detail .btn-primary {
            background: #1a1a1a;
            color: #ffffff;
        }

        .product-detail .btn-primary:hover {
            background: #000000;
            transform: translateY(-1.5px);
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
        }

        .product-detail .btn-secondary {
            background: transparent;
            color: #5a5a5a;
            border: 1px solid #e4e2dd;
        }

        .product-detail .btn-secondary:hover {
            background: #f7f6f3;
            border-color: #b8b3ab;
        }

        .disclaimer {
            max-width: 720px;
            margin: 1.5rem auto 0;
            padding: 1.8rem 2.5rem;
            background: #ffffff;
            border-radius: 14px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.01);
            font-size: 0.78rem;
            color: #8a8a8a;
            line-height: 1.9;
            letter-spacing: 0.3px;
        }

        .disclaimer strong {
            display: block;
            font-weight: 500;
            color: #5a5a5a;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
            font-size: 0.8rem;
        }

        .site-footer {
            text-align: center;
            padding: 2.8rem 2rem 2.2rem;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            margin-top: 2.5rem;
            background: #fcfcfb;
        }

        .footer-slogan {
            font-size: 1rem;
            font-weight: 380;
            letter-spacing: 3px;
            color: #1a1a1a;
            margin-bottom: 0.2rem;
            font-family: 'Times New Roman', serif;
        }

        .footer-sub {
            font-size: 0.7rem;
            letter-spacing: 4px;
            color: #b8b3ab;
            margin-bottom: 0.6rem;
        }

        .footer-email {
            font-size: 0.7rem;
            color: #bfb9b1;
            letter-spacing: 0.5px;
            margin-bottom: 0.8rem;
        }
        .footer-email a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        .footer-email a:hover {
            color: #1a1a1a;
        }

        .footer-copy {
            font-size: 0.7rem;
            color: #ccc7bf;
            letter-spacing: 1px;
        }

        @media (max-width: 700px) {
            .top-nav {
                padding: 0 1rem;
            }
            .nav-menu {
                gap: 1.2rem;
            }
            .nav-link {
                font-size: 0.7rem;
                letter-spacing: 0.5px;
            }
            .nav-logo {
                font-size: 1.1rem;
                letter-spacing: 2px;
            }

            .product-detail {
                padding: 0 1.2rem;
                margin: 2rem auto 1rem;
            }
            .product-detail .detail-card {
                padding: 1.8rem 1.4rem;
            }
            .product-detail .detail-header h2 {
                font-size: 1.5rem;
                letter-spacing: 2px;
            }
            .product-detail .detail-header .price {
                font-size: 1.1rem;
                padding: 0.1rem 1.2rem;
            }
            .product-detail .detail-section p,
            .product-detail .detail-section li {
                font-size: 0.95rem;
            }
            .product-detail .detail-actions {
                flex-direction: column;
            }
            .product-detail .btn-primary,
            .product-detail .btn-secondary {
                text-align: center;
                padding: 0.7rem 1.5rem;
                font-size: 0.75rem;
            }

            .disclaimer {
                padding: 1.4rem 1.4rem;
                margin: 1rem 1.2rem 0;
                font-size: 0.72rem;
            }

            .footer-slogan {
                font-size: 0.85rem;
            }
        }

        @media (max-width: 440px) {
            .top-nav {
                padding: 0 0.8rem;
            }
            .nav-menu {
                gap: 0.8rem;
            }
            .nav-link {
                font-size: 0.6rem;
                letter-spacing: 0.3px;
            }
            .nav-logo {
                font-size: 0.95rem;
                letter-spacing: 1.5px;
            }

            .product-detail {
                padding: 0 0.8rem;
                margin: 1.5rem auto 0.5rem;
            }
            .product-detail .detail-card {
                padding: 1.2rem 1rem;
                border-radius: 14px;
            }
            .product-detail .detail-header h2 {
                font-size: 1.2rem;
            }
            .product-detail .detail-header .price {
                font-size: 0.95rem;
            }
            .product-detail .detail-section p,
            .product-detail .detail-section li {
                font-size: 0.88rem;
            }

            .disclaimer {
                padding: 1rem 1rem;
                margin: 0.8rem 0.8rem 0;
                font-size: 0.68rem;
            }
        }

        .product-detail .loading-placeholder {
            text-align: center;
            padding: 4rem 2rem;
            color: #b8b3ab;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }
        .product-detail .loading-placeholder::after {
            content: '…';
            animation: dots 1.2s steps(4) infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
    </style>
</head>

                <li><a href="tech/index.html" class="nav-link">技术白皮书</a></li>
            </ul>
        </div>
    </nav>

    </footer>

    <script src="js/product.js"></script>
</body>
</html>
